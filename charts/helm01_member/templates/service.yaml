apiVersion: v1
kind: Service
metadata:
  # Chart의 정보 참조 할 때 첫글자를 대문자로
  name: "{{ .Chart.Name }}-service"
spec:
  # values.yaml 파일에 있는 내용을 참조해서 전달
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Chart.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}      
      targetPort: {{ .Values.service.containerPort }}